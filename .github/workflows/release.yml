# 태그(v*) 푸시 또는 수동 실행 → macOS 빌드 → Developer ID 서명 → 공증 → GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (예: 0.1.1) — 비우면 날짜 사용"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-notarize-release:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          # Prefer Xcode 16+ (Swift 6) when present; otherwise latest Xcode.app
          for c in \
            /Applications/Xcode_16.4.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_16.0.app \
            /Applications/Xcode_16.app \
            /Applications/Xcode.app
          do
            if [[ -d "$c" ]]; then
              sudo xcode-select -s "$c/Contents/Developer"
              echo "Selected $c"
              break
            fi
          done
          xcodebuild -version
          swift --version
          ls /Applications | grep -i xcode || true

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            RAW="${{ github.ref_name }}"
            VER="${RAW#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
            VER="${VER#v}"
          else
            VER="0.1.$(date +%Y%m%d%H%M)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Release version: $VER"

      - name: Import Developer ID certificates (Application + Installer)
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE_BASE64:-}" ]]; then
            echo "Missing secret APPLE_CERTIFICATE_BASE64"
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/webdock.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          APP_P12="$RUNNER_TEMP/developer_id_app.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$APP_P12"
          security import "$APP_P12" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm -f "$APP_P12"

          if [[ -n "${APPLE_INSTALLER_CERTIFICATE_BASE64:-}" ]]; then
            INST_P12="$RUNNER_TEMP/developer_id_installer.p12"
            echo "$APPLE_INSTALLER_CERTIFICATE_BASE64" | base64 --decode > "$INST_P12"
            security import "$INST_P12" -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            rm -f "$INST_P12"
            echo "Installer certificate imported"
          else
            echo "WARNING: no Installer certificate secret — .pkg will be skipped"
          fi

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed -e 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security find-identity -v "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          KEY_DIR="$RUNNER_TEMP/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$APPLE_API_KEY_P8" > "$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "API_KEY_PATH=$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Build app (unsigned intermediate)
        run: |
          chmod +x build_app.sh
          # Info.plist version 주입
          VER="${{ steps.ver.outputs.version }}"
          export SKIP_SIGN=1
          ./build_app.sh
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VER" WebDock.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VER" WebDock.app/Contents/Info.plist

      - name: Sign with Developer ID (hardened runtime)
        env:
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          ID="${SIGN_IDENTITY:-Developer ID Application: jaehoon oh (ABSDM8J4UQ)}"
          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$ID" \
            WebDock.app/Contents/MacOS/WebDock
          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$ID" \
            WebDock.app
          codesign --verify --deep --strict --verbose=2 WebDock.app
          codesign -dv --verbose=2 WebDock.app 2>&1 | grep -E 'Authority|TeamIdentifier|flags|Timestamp' || true

      - name: Notarize and staple
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          ZIP="$RUNNER_TEMP/WebDock-notarize.zip"
          rm -f "$ZIP"
          ditto -c -k --keepParent WebDock.app "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple WebDock.app
          xcrun stapler validate WebDock.app
          spctl -a -vv WebDock.app 2>&1 || true

      - name: Package release zip
        run: |
          VER="${{ steps.ver.outputs.version }}"
          mkdir -p dist
          OUT="dist/WebDock-macOS-${VER}.zip"
          ditto -c -k --keepParent WebDock.app "$OUT"
          ls -lh dist/

      - name: Build signed .pkg installer
        env:
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          if ! security find-identity -v "$KEYCHAIN_PATH" | grep -q "Developer ID Installer"; then
            echo "No Developer ID Installer identity — skipping .pkg"
            exit 0
          fi

          INST_ID="${APPLE_INSTALLER_IDENTITY:-Developer ID Installer: jaehoon oh (ABSDM8J4UQ)}"
          PKG_ROOT="$RUNNER_TEMP/pkgroot"
          rm -rf "$PKG_ROOT"
          mkdir -p "$PKG_ROOT/Applications"
          # Copy notarized app into payload
          ditto WebDock.app "$PKG_ROOT/Applications/WebDock.app"

          COMPONENT_PKG="$RUNNER_TEMP/WebDock-component.pkg"
          UNSIGNED_PKG="$RUNNER_TEMP/WebDock-unsigned.pkg"
          SIGNED_PKG="dist/WebDock-macOS-${VER}.pkg"

          # component package → product archive
          pkgbuild \
            --root "$PKG_ROOT" \
            --identifier com.poc.webdock \
            --version "$VER" \
            --install-location / \
            "$COMPONENT_PKG"

          productbuild \
            --package "$COMPONENT_PKG" \
            "$UNSIGNED_PKG"

          productsign \
            --sign "$INST_ID" \
            --keychain "$KEYCHAIN_PATH" \
            "$UNSIGNED_PKG" \
            "$SIGNED_PKG"

          echo "Notarizing pkg…"
          xcrun notarytool submit "$SIGNED_PKG" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple "$SIGNED_PKG"
          xcrun stapler validate "$SIGNED_PKG" || true
          pkgutil --check-signature "$SIGNED_PKG" || true
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDock-macOS-${{ steps.ver.outputs.version }}
          path: |
            dist/WebDock-macOS-*.zip
            dist/WebDock-macOS-*.pkg
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: WebDock v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/WebDock-macOS-*.zip
            dist/WebDock-macOS-*.pkg
          body: |
            ## WebDock v${{ steps.ver.outputs.version }}

            Pre-built **macOS 14+** builds:

            | File | Use |
            |------|-----|
            | **`WebDock-macOS-${{ steps.ver.outputs.version }}.pkg`** | Installer → installs to **Applications** |
            | **`WebDock-macOS-${{ steps.ver.outputs.version }}.zip`** | Unzip and run `WebDock.app` |

            **Docs:** [EN](https://github.com/alice-cli/WebDock/blob/main/README.md) · [KO](https://github.com/alice-cli/WebDock/blob/main/docs/README.ko.md) · [JA](https://github.com/alice-cli/WebDock/blob/main/docs/README.ja.md) · [ZH](https://github.com/alice-cli/WebDock/blob/main/docs/README.zh.md) · [DE](https://github.com/alice-cli/WebDock/blob/main/docs/README.de.md) · [FR](https://github.com/alice-cli/WebDock/blob/main/docs/README.fr.md)

            ---

            ### English — Install
            **Option A (pkg):** open **WebDock-macOS-….pkg** → follow installer → app in **Applications**  
            **Option B (zip):** unzip → open **WebDock.app**  
            Then: System Settings → **Screen Recording** + **Accessibility** → start server in app (port `8080`) → browser `http://127.0.0.1:8080`

            ### 한국어 — 설치
            **pkg:** **WebDock-macOS-….pkg** 실행 → **응용 프로그램**에 설치  
            **zip:** 압축 해제 후 **WebDock.app** 실행  
            이후: **화면 기록** · **손쉬운 사용** 허용 → 앱에서 서버 켜기 → `http://127.0.0.1:8080`

            ### 日本語
            **pkg** でインストール（アプリケーション）または **zip** を展開。画面収録・アクセシビリティを許可 → サーバー開始 → `http://127.0.0.1:8080`

            ### 中文
            **pkg** 安装到“应用程序”，或解压 **zip**。允许屏幕录制与辅助功能 → 启动服务器 → `http://127.0.0.1:8080`

            ### Deutsch
            **pkg** (Programme) oder **zip**. Bildschirmaufnahme + Bedienungshilfen → Server starten → `http://127.0.0.1:8080`

            ### Français
            **pkg** (Applications) ou **zip**. Enregistrement d’écran + Accessibilité → démarrer le serveur → `http://127.0.0.1:8080`

            ---
            **Web UI languages:** EN · KO · JA · ZH · DE · FR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
