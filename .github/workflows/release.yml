# 태그(v*) 푸시 또는 수동 실행 → macOS 빌드 → Developer ID 서명 → 공증 → GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (예: 0.1.1) — 비우면 날짜 사용"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-notarize-release:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          # Prefer Xcode 16+ (Swift 6) when present; otherwise latest Xcode.app
          for c in \
            /Applications/Xcode_16.4.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_16.0.app \
            /Applications/Xcode_16.app \
            /Applications/Xcode.app
          do
            if [[ -d "$c" ]]; then
              sudo xcode-select -s "$c/Contents/Developer"
              echo "Selected $c"
              break
            fi
          done
          xcodebuild -version
          swift --version
          ls /Applications | grep -i xcode || true

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            RAW="${{ github.ref_name }}"
            VER="${RAW#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
            VER="${VER#v}"
          else
            VER="0.1.$(date +%Y%m%d%H%M)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Release version: $VER"

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE_BASE64:-}" ]]; then
            echo "Missing secret APPLE_CERTIFICATE_BASE64"
            exit 1
          fi
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/webdock.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 32)"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed -e 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> "$GITHUB_ENV"
          rm -f "$CERT_PATH"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          KEY_DIR="$RUNNER_TEMP/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$APPLE_API_KEY_P8" > "$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "API_KEY_PATH=$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Build app (unsigned intermediate)
        run: |
          chmod +x build_app.sh
          # Info.plist version 주입
          VER="${{ steps.ver.outputs.version }}"
          export SKIP_SIGN=1
          ./build_app.sh
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VER" WebDock.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VER" WebDock.app/Contents/Info.plist

      - name: Sign with Developer ID (hardened runtime)
        env:
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          ID="${SIGN_IDENTITY:-Developer ID Application: jaehoon oh (ABSDM8J4UQ)}"
          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$ID" \
            WebDock.app/Contents/MacOS/WebDock
          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$ID" \
            WebDock.app
          codesign --verify --deep --strict --verbose=2 WebDock.app
          codesign -dv --verbose=2 WebDock.app 2>&1 | grep -E 'Authority|TeamIdentifier|flags|Timestamp' || true

      - name: Notarize and staple
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          ZIP="$RUNNER_TEMP/WebDock-notarize.zip"
          rm -f "$ZIP"
          ditto -c -k --keepParent WebDock.app "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple WebDock.app
          xcrun stapler validate WebDock.app
          spctl -a -vv WebDock.app 2>&1 || true

      - name: Package release zip
        run: |
          VER="${{ steps.ver.outputs.version }}"
          mkdir -p dist
          OUT="dist/WebDock-macOS-${VER}.zip"
          ditto -c -k --keepParent WebDock.app "$OUT"
          ls -lh dist/
          echo "ASSET_PATH=$OUT" >> "$GITHUB_ENV"
          echo "ASSET_NAME=WebDock-macOS-${VER}.zip" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDock-macOS-${{ steps.ver.outputs.version }}
          path: dist/WebDock-macOS-*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: WebDock v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/WebDock-macOS-*.zip
          body: |
            ## WebDock v${{ steps.ver.outputs.version }}

            Pre-built **macOS 14+** app · `WebDock-macOS-${{ steps.ver.outputs.version }}.zip`

            **Docs:** [EN](https://github.com/alice-cli/WebDock/blob/main/README.md) · [KO](https://github.com/alice-cli/WebDock/blob/main/docs/README.ko.md) · [JA](https://github.com/alice-cli/WebDock/blob/main/docs/README.ja.md) · [ZH](https://github.com/alice-cli/WebDock/blob/main/docs/README.zh.md) · [DE](https://github.com/alice-cli/WebDock/blob/main/docs/README.de.md) · [FR](https://github.com/alice-cli/WebDock/blob/main/docs/README.fr.md)

            ---

            ### English — Install
            1. Download **WebDock-macOS-${{ steps.ver.outputs.version }}.zip**
            2. Unzip → open **WebDock.app**
            3. System Settings → **Privacy & Security** → enable **Screen Recording** and **Accessibility** for WebDock
            4. In the app: start server (port `8080`), optional access token
            5. Browser: `http://127.0.0.1:8080` → select a window

            ### 한국어 — 설치
            1. **WebDock-macOS-${{ steps.ver.outputs.version }}.zip** 다운로드
            2. 압축 해제 → **WebDock.app** 실행
            3. **시스템 설정 → 개인정보 보호 및 보안** → **화면 기록** · **손쉬운 사용** 허용
            4. 앱에서 서버 시작 (포트 `8080`), 필요 시 토큰
            5. 브라우저 `http://127.0.0.1:8080` → 창 선택

            ### 日本語 — インストール
            1. **WebDock-macOS-${{ steps.ver.outputs.version }}.zip** をダウンロード
            2. 解凍 → **WebDock.app** を開く
            3. **画面収録** と **アクセシビリティ** を許可
            4. サーバー開始（ポート `8080`）
            5. ブラウザ `http://127.0.0.1:8080`

            ### 中文 — 安装
            1. 下载 **WebDock-macOS-${{ steps.ver.outputs.version }}.zip**
            2. 解压并运行 **WebDock.app**
            3. 允许 **屏幕录制** 与 **辅助功能**
            4. 启动服务器（端口 `8080`）
            5. 浏览器打开 `http://127.0.0.1:8080`

            ### Deutsch — Installation
            1. **WebDock-macOS-${{ steps.ver.outputs.version }}.zip** laden
            2. Entpacken → **WebDock.app** starten
            3. **Bildschirmaufnahme** + **Bedienungshilfen** erlauben
            4. Server starten (Port `8080`)
            5. Browser: `http://127.0.0.1:8080`

            ### Français — Installation
            1. Télécharger **WebDock-macOS-${{ steps.ver.outputs.version }}.zip**
            2. Décompresser → lancer **WebDock.app**
            3. Autoriser **Enregistrement de l’écran** et **Accessibilité**
            4. Démarrer le serveur (port `8080`)
            5. Navigateur : `http://127.0.0.1:8080`

            ---
            **Web UI languages:** EN · KO · JA · ZH · DE · FR (header menu)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
